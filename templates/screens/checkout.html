<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CUSTOMIZE: page title -->
  <title>Checkout</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-input: #252525;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2a2a;
      --radius: 12px;
      --step-done: #22c55e;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 960px; margin: 0 auto; }

    /* PROGRESS STEPS */
    .steps {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin-bottom: 2.5rem;
    }
    .step-chip {
      font-size: 0.8rem; padding: 0.375rem 1rem; border-radius: 20px;
      background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
    }
    .step-chip.done { background: var(--step-done); color: #fff; border-color: var(--step-done); }
    /* CUSTOMIZE: active step -->  */
    .step-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .step-arrow { color: var(--text-muted); font-size: 0.8rem; }

    /* TWO COLUMNS */
    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }

    /* PAYMENT FORM */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .form-card h2 { font-size: 1.25rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.875rem; margin-bottom: 0.375rem; }
    .field input {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .row { display: flex; gap: 1rem; }
    .row .field { flex: 1; }

    /* ORDER SUMMARY */
    .summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      align-self: start;
    }
    .summary h2 { font-size: 1.25rem; margin-bottom: 1.5rem; }
    /* CUSTOMIZE: line items -->  */
    .line-item {
      display: flex; justify-content: space-between;
      padding: 0.5rem 0; font-size: 0.9rem;
    }
    .line-item.total {
      border-top: 1px solid var(--border); margin-top: 0.75rem;
      padding-top: 0.75rem; font-weight: 700; font-size: 1.1rem;
    }
    .pay-btn {
      display: block; width: 100%; padding: 0.875rem;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
      font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem;
      transition: background 0.2s;
    }
    .pay-btn:hover { background: var(--accent-hover); }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- CUSTOMIZE: checkout progress steps -->
    <div class="steps">
      <span class="step-chip done">Cart</span>
      <span class="step-arrow">&rarr;</span>
      <span class="step-chip active">Payment</span>
      <span class="step-arrow">&rarr;</span>
      <span class="step-chip">Confirmation</span>
    </div>

    <div class="grid">
      <!-- CUSTOMIZE: payment form -->
      <div class="form-card">
        <h2>Payment Details</h2>
        <div class="field">
          <label for="card-name">Name on Card</label>
          <input type="text" id="card-name" placeholder="Jane Doe">
        </div>
        <div class="field">
          <label for="card-number">Card Number</label>
          <input type="text" id="card-number" placeholder="1234 5678 9012 3456">
        </div>
        <div class="row">
          <div class="field">
            <label for="expiry">Expiry</label>
            <input type="text" id="expiry" placeholder="MM/YY">
          </div>
          <div class="field">
            <label for="cvc">CVC</label>
            <input type="text" id="cvc" placeholder="123">
          </div>
        </div>
        <div class="field">
          <label for="billing-zip">Billing Zip</label>
          <input type="text" id="billing-zip" placeholder="10001">
        </div>
      </div>

      <!-- CUSTOMIZE: order summary -->
      <div class="summary">
        <h2>Order Summary</h2>
        <div class="line-item"><span>Pro Plan (monthly)</span><span>$29.00</span></div>
        <div class="line-item"><span>Tax</span><span>$2.61</span></div>
        <div class="line-item total"><span>Total</span><span>$31.61</span></div>
        <button class="pay-btn">Pay Now</button>
      </div>
    </div>
  </div>
</body>
</html>
