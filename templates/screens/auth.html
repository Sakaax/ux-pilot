<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CUSTOMIZE: page title -->
  <title>Sign In</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-input: #252525;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2a2a;
      --radius: 12px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
    }

    /* SPLIT LAYOUT */
    .split { display: flex; width: 100%; min-height: 100vh; }
    .split-brand {
      flex: 1;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    /* CUSTOMIZE: brand panel content -->  */
    .split-brand h1 { font-size: 2.5rem; font-weight: 700; max-width: 400px; }
    .split-brand p { color: #a5b4fc; margin-top: 1rem; max-width: 400px; }
    .split-form {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .form-wrapper { width: 100%; max-width: 400px; }
    .form-wrapper h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .form-wrapper .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }

    /* SOCIAL BUTTONS */
    .social-btns { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    /* CUSTOMIZE: social login providers -->  */
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.95rem;
      cursor: pointer; transition: border-color 0.2s;
    }
    .social-btn:hover { border-color: var(--accent); }
    .divider { text-align: center; color: var(--text-muted); margin: 1.5rem 0; font-size: 0.85rem; }

    /* FORM */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.875rem; margin-bottom: 0.375rem; }
    .form-group input {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .submit-btn {
      width: 100%; padding: 0.875rem; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--accent-hover); }
    .form-footer { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--text-muted); }
    .form-footer a { color: var(--accent); text-decoration: none; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .split-brand { display: none; }
      .split-form { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="split">
    <!-- CUSTOMIZE: brand panel -->
    <div class="split-brand">
      <div>
        <h1>Welcome back</h1>
        <p>Sign in to continue building with your team.</p>
      </div>
    </div>

    <div class="split-form">
      <div class="form-wrapper">
        <!-- CUSTOMIZE: form heading -->
        <h2>Sign in</h2>
        <p class="subtitle">Choose your preferred sign-in method</p>

        <!-- CUSTOMIZE: social login buttons -->
        <div class="social-btns">
          <button class="social-btn">Continue with Google</button>
          <button class="social-btn">Continue with GitHub</button>
        </div>
        <div class="divider">or continue with email</div>

        <!-- CUSTOMIZE: form fields -->
        <form>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
          </div>
          <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <!-- CUSTOMIZE: footer link -->
        <p class="form-footer">Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </div>
  </div>
</body>
</html>
