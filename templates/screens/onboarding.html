<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CUSTOMIZE: page title -->
  <title>Onboarding</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-input: #252525;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2a2a;
      --radius: 12px;
      --step-done: #22c55e;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wizard { width: 100%; max-width: 600px; }

    /* PROGRESS BAR */
    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 3rem;
    }
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.9rem;
      background: var(--bg-input);
      border: 2px solid var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .step-indicator.done { background: var(--step-done); border-color: var(--step-done); color: #fff; }
    /* CUSTOMIZE: active step number -->  */
    .step-indicator.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-line { width: 80px; height: 2px; background: var(--border); }
    .step-line.done { background: var(--step-done); }

    /* CARD */
    .step-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
    }
    /* CUSTOMIZE: step title -->  */
    .step-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    /* CUSTOMIZE: step description -->  */
    .step-card p.desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }

    /* FORM FIELDS */
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.875rem; margin-bottom: 0.375rem; }
    .field input, .field select {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    /* BUTTONS */
    .actions { display: flex; justify-content: space-between; margin-top: 2rem; }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-secondary { background: var(--bg-input); color: var(--text); }
    .btn-secondary:hover { background: #333; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }

    /* STEP LABELS */
    .step-labels { display: flex; justify-content: center; gap: 5rem; margin-top: 0.75rem; margin-bottom: 2rem; }
    .step-label { font-size: 0.8rem; color: var(--text-muted); text-align: center; }
    .step-label.active { color: var(--text); }
  </style>
</head>
<body>
  <div class="wizard">
    <!-- CUSTOMIZE: progress steps -->
    <div class="progress-bar">
      <div class="step-indicator done">1</div>
      <div class="step-line done"></div>
      <div class="step-indicator active">2</div>
      <div class="step-line"></div>
      <div class="step-indicator">3</div>
    </div>
    <!-- CUSTOMIZE: step labels -->
    <div class="step-labels">
      <span class="step-label">Account</span>
      <span class="step-label active">Profile</span>
      <span class="step-label">Preferences</span>
    </div>

    <!-- CUSTOMIZE: current step content -->
    <div class="step-card">
      <h2>Set up your profile</h2>
      <p class="desc">Tell us a bit about yourself so we can personalize your experience.</p>

      <!-- CUSTOMIZE: form fields for this step -->
      <div class="field">
        <label for="display-name">Display Name</label>
        <input type="text" id="display-name" placeholder="Jane Doe">
      </div>
      <div class="field">
        <label for="role">Role</label>
        <select id="role">
          <option value="" disabled selected>Select your role</option>
          <option>Designer</option>
          <option>Developer</option>
          <option>Product Manager</option>
          <option>Other</option>
        </select>
      </div>

      <div class="actions">
        <button class="btn btn-secondary">Back</button>
        <button class="btn btn-primary">Continue</button>
      </div>
    </div>
  </div>
</body>
</html>
